<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VermiLoop — الزراعة الذكية بالديدان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #0d2818;
    --green-dark: #1a4a2e;
    --green-mid: #2d6a4f;
    --green-bright: #40916c;
    --green-light: #74c69d;
    --green-pale: #b7e4c7;
    --green-mist: #d8f3dc;
    --white: #f8fdf9;
    --off-white: #eaf4ec;
    --gold: #c9a84c;
    --gold-light: #e8cc7a;
    --text-primary: #0d2818;
    --text-secondary: #2d6a4f;
    --text-muted: #5a8a6a;
    --danger: #c0392b;
    --warn: #e67e22;
    --ideal: #27ae60;
    --shadow: 0 8px 40px rgba(13,40,24,0.13);
    --radius: 18px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: var(--green-deep);
    color: var(--white);
    overflow-x: hidden;
    direction: rtl;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; width: 100%; z-index: 999;
    background: rgba(13,40,24,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(116,198,157,0.15);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  
  /* التعديل هنا: أضفنا direction: ltr عشان الكلمة تظهر مظبوطة */
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Tajawal', sans-serif;
    font-weight: 800; font-size: 1.5rem;
    color: var(--green-light); letter-spacing: -0.5px;
    direction: ltr; 
  }
  
  .nav-brand span { color: var(--gold); }
  .nav-logo-icon {
    width: 38px; height: 38px; background: var(--green-mid);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    direction: rtl; /* عشان الأيقونة تفضل مكانها صح */
  }
  .nav-links {
    display: flex; gap: 0; list-style: none;
  }
  .nav-links a {
    display: block; padding: 0.45rem 0.85rem;
    color: var(--green-pale); text-decoration: none;
    font-size: 0.82rem; font-weight: 600;
    border-radius: 8px; transition: all 0.2s;
  }
  .nav-links a:hover { background: rgba(116,198,157,0.12); color: var(--green-light); }
  .nav-burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .nav-burger span { width: 24px; height: 2px; background: var(--green-light); border-radius: 2px; transition: 0.3s; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 70% 30%, rgba(45,106,79,0.45) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(64,145,108,0.25) 0%, transparent 50%),
      linear-gradient(160deg, #0d2818 0%, #1a3d26 50%, #0d2818 100%);
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 6rem 2rem 4rem;
    position: relative; overflow: hidden;
  }
  /* ... (بقية التنسيقات كما هي) ... */
</style>
</head>
<body>

<nav id="main-nav">
  <div class="nav-brand">
    <div class="nav-logo-icon">🪱</div>
    Vermi<span>Loop</span>
  </div>
  <ul class="nav-links" id="nav-links">
    <li><a href="#admin">المؤسس</a></li>
    <li><a href="#science">علم الديدان</a></li>
    <li><a href="#calculator">الحاسبة</a></li>
    <li><a href="#education">التعليم</a></li>
    <li><a href="#comparison">المقارنة</a></li>
    <li><a href="#innovation">الابتكار</a></li>
    <li><a href="#pricing">الأسعار</a></li>
  </ul>
  <div class="nav-burger" id="nav-burger" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </div>
</nav>

<section class="hero" id="home">
  <div class="hero-inner">
    <div class="hero-badge">الزراعة الذكية بالديدان الحمراء</div>
    <h1 class="hero-title" style="direction: ltr;">
      <em>Vermi</em><span class="gold">Loop</span><br><span style="direction: rtl; display: inline-block;">المستقبل الأخضر</span>
    </h1>
    <p class="hero-sub">
      نحوّل بقايا الطعام إلى ذهب زراعي عضوي — حلول ذكية بالديدان الحمراء لتحسين التربة ورفع الإنتاجية.
    </p>
    <a href="#calculator" class="hero-cta">🧮 استخدم الحاسبة الذكية</a>
  </div>
</section>

<script>
  function toggleNav() {
    const links = document.getElementById('nav-links');
    links.classList.toggle('open');
  }
</script>

</body>
</html>
